    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            cursor: crosshair;
        }

        body {
            min-height: 100vh;
            background: radial-gradient(circle at center, #1a1a1a 0%, #000000 100%);
            background-size: 400% 400%;
            animation: modernGradient 10s ease infinite;
            font-family: 'JetBrains Mono', monospace;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow-x: hidden;
            color: #fff;
        }

        @keyframes modernGradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .hacker-card {
            width: 100%;
            max-width: 750px;
            background: rgba(0, 0, 0, 0.9);
            border: 2px solid #fff;
            border-radius: 8px;
            padding: 50px 30px;
            text-align: center;
            position: relative;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.1), 10px 10px 0px rgba(0, 255, 255, 0.8);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .hacker-card:hover {
            transform: scale(1.02);
            box-shadow: 0 0 30px rgba(255, 0, 204, 0.3), 15px 15px 0px rgba(255, 0, 204, 0.8);
        }

        .card-header {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 35px;
            background: #fff;
            display: flex;
            align-items: center;
            padding: 0 15px;
            border-radius: 6px 6px 0 0;
        }

        .circle {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 8px;
        }
        .red { background: #ff5f56; }
        .yellow { background: #ffbd2e; }
        .green { background: #27c93f; }

        .logo-wrapper {
            margin-bottom: 25px;
            display: flex;
            justify-content: center;
        }

        .logo-img {
            width: 100%;
            max-width: 380px;
            border: 2px solid #fff;
            box-shadow: 0 0 15px rgba(255,255,255,0.2);
        }

        .glitch-title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(2.5rem, 8vw, 4.5rem);
            letter-spacing: 3px;
            line-height: 0.9;
            margin-bottom: 10px;
            background: linear-gradient(to bottom, #fff, #888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 8px rgba(0, 255, 255, 0.5));
        }

        .power-tag {
            font-family: 'JetBrains Mono', monospace;
            font-weight: 800;
            font-size: 0.9rem;
            color: #000;
            background: #00ffff;
            padding: 4px 15px;
            display: inline-block;
            margin-bottom: 35px;
            text-transform: uppercase;
        }

        .glitch-box {
            background: #0a0a0a;
            border-left: 5px solid #ff00cc;
            padding: 25px;
            margin: 0 auto;
        }

        .glitch-text {
            color: #00ff00;
            font-family: 'JetBrains Mono', monospace;
            font-size: clamp(1.2rem, 4vw, 1.8rem);
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .custom-footer {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: #fff;
            color: #000;
            padding: 12px 0;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.2rem;
            letter-spacing: 2px;
            border-top: 4px solid #ff00cc;
        }

        .footer-marquee {
            white-space: nowrap;
            overflow: hidden;
        }

        .footer-marquee span {
            display: inline-block;
            padding-left: 100%;
            animation: marquee 15s linear infinite;
        }

        @keyframes marquee {
            0% { transform: translate(0, 0); }
            100% { transform: translate(-100%, 0); }
        }

        @media (max-width: 600px) {
            .hacker-card { padding: 40px 20px; }
            .logo-img { max-width: 100%; }
            body { padding-bottom: 80px; }
        }
    </style>
</head>
